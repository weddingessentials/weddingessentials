name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -X GET \
            'https://nwadggfvgplghnzekhzm.supabase.co/rest/v1/' \
            -H 'apikey: ${{ secrets.SUPABASE_ANON_KEY }}' \
            -H 'Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}'
