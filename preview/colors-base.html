<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Montserrat', sans-serif; background: #FAF8F4; padding: 24px; }
  .swatches { display: flex; gap: 0; }
  .swatch { flex: 1; }
  .swatch-block { height: 80px; }
  .swatch-info { padding: 10px 12px 0; }
  .swatch-name { font-size: 9px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: #1A1814; }
  .swatch-hex { font-size: 11px; color: #8A8478; margin-top: 3px; }
  .border-swatch { border: 1px solid rgba(184,146,74,0.15); }
</style>
</head>
<body>
<div class="swatches">
  <div class="swatch">
    <div class="swatch-block border-swatch" style="background:#FAF8F4;"></div>
    <div class="swatch-info">
      <div class="swatch-name">Cream</div>
      <div class="swatch-hex">#FAF8F4</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch-block" style="background:#F0EDE6;"></div>
    <div class="swatch-info">
      <div class="swatch-name">Cream Dark</div>
      <div class="swatch-hex">#F0EDE6</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch-block" style="background:#8A8478;"></div>
    <div class="swatch-info">
      <div class="swatch-name">Mid</div>
      <div class="swatch-hex">#8A8478</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch-block" style="background:#B8924A;"></div>
    <div class="swatch-info">
      <div class="swatch-name">Gold</div>
      <div class="swatch-hex">#B8924A</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch-block" style="background:#D4AA6A;"></div>
    <div class="swatch-info">
      <div class="swatch-name">Gold Light</div>
      <div class="swatch-hex">#D4AA6A</div>
    </div>
  </div>
  <div class="swatch">
    <div class="swatch-block" style="background:#1A1814;"></div>
    <div class="swatch-info">
      <div class="swatch-name" style="color:#FAF8F4;">Dark</div>
      <div class="swatch-hex">#1A1814</div>
    </div>
  </div>
</div>
</body>
</html>
