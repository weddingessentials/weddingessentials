<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Montserrat', sans-serif; background: #FAF8F4; padding: 28px 32px; display: flex; flex-direction: column; gap: 20px; }
  .row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .label-sm { font-size: 8px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: #8A8478; min-width: 72px; }

  /* Buttons */
  .btn-primary { display: inline-block; font-size: 10px; font-weight: 500; letter-spacing: 3px; text-transform: uppercase; color: #fff; background: #1A1814; padding: 16px 44px; cursor: pointer; border: none; transition: background 0.3s; }
  .btn-primary:hover { background: #B8924A; }
  .btn-ghost { display: inline-block; font-size: 10px; font-weight: 500; letter-spacing: 3px; text-transform: uppercase; color: #1A1814; padding: 14px 36px; border: 1px solid rgba(26,24,20,0.25); cursor: pointer; background: none; transition: all 0.3s; }
  .btn-ghost:hover { border-color: #B8924A; color: #B8924A; }
  .btn-gold { display: inline-block; font-size: 10px; font-weight: 500; letter-spacing: 3px; text-transform: uppercase; color: #fff; background: #B8924A; padding: 16px 32px; border: none; cursor: pointer; transition: background 0.3s; }
  .btn-gold:hover { background: #D4AA6A; }
  .nav-cta { font-size: 10px; font-weight: 500; letter-spacing: 2.5px; text-transform: uppercase; color: #1A1814; text-decoration: none; border-bottom: 1px solid #B8924A; padding-bottom: 2px; }
  .arrow-link { font-size: 10px; font-weight: 500; letter-spacing: 2.5px; text-transform: uppercase; color: #B8924A; display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .arrow-link:hover { gap: 18px; }
  .arrow-link::after { content: '→'; }
</style>
</head>
<body>
  <div class="row">
    <div class="label-sm">Primary</div>
    <button class="btn-primary">Enquire Now</button>
    <button class="btn-primary" style="background:#B8924A;">Hover State</button>
  </div>
  <div class="row">
    <div class="label-sm">Ghost</div>
    <button class="btn-ghost">Work with me</button>
    <button class="btn-ghost" style="border-color:#B8924A;color:#B8924A;">Hover State</button>
  </div>
  <div class="row">
    <div class="label-sm">Gold / Form</div>
    <button class="btn-gold">Send Me the Guide</button>
    <button class="btn-gold" style="background:#D4AA6A;">Hover State</button>
  </div>
  <div class="row">
    <div class="label-sm">Text Links</div>
    <a class="nav-cta">Enquire</a>
    <div class="arrow-link">Learn more</div>
    <div class="arrow-link" style="gap:18px;">Hover state →</div>
  </div>
</body>
</html>
