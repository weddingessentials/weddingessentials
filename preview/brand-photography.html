<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Montserrat', sans-serif; background: #1A1814; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: 1fr 1fr; gap: 2px; height: 100%; min-height: 200px; }
  .photo { position: relative; overflow: hidden; }
  .photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .photo-label { position: absolute; bottom: 0; left: 0; right: 0; padding: 10px 12px; background: linear-gradient(to top, rgba(26,24,20,0.85), transparent); }
  .photo-label span { font-size: 7.5px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: #D4AA6A; }
  .photo:first-child { grid-column: span 2; }
</style>
</head>
<body>
  <div class="photo">
    <img src="../assets/photo-bride-staircase.jpg" alt="Bride on staircase — Dubai luxury venue">
    <div class="photo-label"><span>Dubai Venue · Marble Staircase</span></div>
  </div>
  <div class="photo">
    <img src="../assets/photo-team-bride.jpg" alt="Team Bride by Wedding Essentials">
    <div class="photo-label"><span>Team Bride · Bridal Assistant</span></div>
  </div>
  <div class="photo">
    <img src="../assets/photo-bride-preparation.jpg" alt="Bride being prepared — B&W editorial">
    <div class="photo-label"><span>Editorial · B&W · Preparation</span></div>
  </div>
  <div class="photo">
    <img src="../assets/photo-orchid-bouquet.jpg" alt="Orchid bouquet detail">
    <div class="photo-label"><span>Detail · Orchid Bouquet</span></div>
  </div>
  <div class="photo">
    <img src="../assets/photo-brand-card.jpg" alt="Wedding Essentials brand card">
    <div class="photo-label"><span>Brand Identity · Card</span></div>
  </div>
</body>
</html>
