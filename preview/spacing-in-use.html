<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Montserrat', sans-serif; background: #FAF8F4; padding: 24px; display: flex; gap: 16px; align-items: flex-start; }
  .label-block { font-size: 8px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: #8A8478; margin-bottom: 10px; }

  /* Section divider */
  .divider-demo { flex: 1; }
  .section-sep { width: 40px; height: 1px; background: #B8924A; margin: 8px 0 16px; }
  .sep-full { width: 100%; height: 1px; background: rgba(184,146,74,0.2); margin: 12px 0; }

  /* Grid gap */
  .gap-demo { flex: 1; }
  .mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; background: rgba(184,146,74,0.12); }
  .mini-cell { background: #FAF8F4; padding: 14px; font-family: 'Cormorant Garamond', serif; font-size: 13px; font-weight: 300; color: #8A8478; }

  /* Vertical rhythm */
  .rhythm-demo { flex: 1; }
  .rh-bar { background: rgba(184,146,74,0.15); margin-bottom: 8px; height: 4px; border-radius: 0; }
</style>
</head>
<body>
  <div class="divider-demo">
    <div class="label-block">Dividers</div>
    <div class="section-sep"></div>
    <div style="font-family:'Cormorant Garamond',serif;font-size:14px;color:#1A1814;font-weight:300;">Section heading</div>
    <div class="sep-full"></div>
    <div style="font-size:10px;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;color:#B8924A;">Label text</div>
    <div style="width:1px;height:48px;background:linear-gradient(to bottom,#B8924A,transparent);margin:12px 0;"></div>
    <div style="font-size:11px;color:#8A8478;font-weight:300;">Vertical gradient line</div>
  </div>

  <div class="gap-demo">
    <div class="label-block">Grid Hairlines (2px)</div>
    <div class="mini-grid">
      <div class="mini-cell">Service one</div>
      <div class="mini-cell">Service two</div>
      <div class="mini-cell">Service three</div>
      <div class="mini-cell">Service four</div>
    </div>
  </div>

  <div class="rhythm-demo">
    <div class="label-block">Vertical Rhythm (8px base)</div>
    <div class="rh-bar" style="width:100%;"></div>
    <div class="rh-bar" style="width:75%;"></div>
    <div class="rh-bar" style="width:90%;"></div>
    <div class="rh-bar" style="width:60%;"></div>
    <div class="rh-bar" style="width:85%;"></div>
    <div style="font-size:9px;color:#B8924A;letter-spacing:1px;margin-top:8px;">8 · 16 · 24 · 32 · 40 · 48 · 60 · 80 · 100 · 120</div>
  </div>
</body>
</html>
