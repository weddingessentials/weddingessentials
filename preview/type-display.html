<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Montserrat', sans-serif; background: #FAF8F4; padding: 24px 32px; }
  .specimen { margin-bottom: 16px; border-bottom: 1px solid rgba(184,146,74,0.12); padding-bottom: 14px; display: flex; align-items: baseline; gap: 20px; }
  .specimen:last-child { border-bottom: none; margin-bottom: 0; }
  .meta { font-size: 8px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: #B8924A; min-width: 80px; line-height: 1.6; }
  .text { font-family: 'Cormorant Garamond', serif; color: #1A1814; }
  .em { font-style: italic; color: #B8924A; }
</style>
</head>
<body>
  <div class="specimen">
    <div class="meta">Display XL<br>96px / 300</div>
    <div class="text" style="font-size:52px;font-weight:300;line-height:1.1;letter-spacing:-1px;">The day is planned.<br>Now prepare <span class="em">yourself.</span></div>
  </div>
  <div class="specimen">
    <div class="meta">Display LG<br>56px / 300</div>
    <div class="text" style="font-size:42px;font-weight:300;line-height:1.2;">Every service exists<br>for one reason.</div>
  </div>
  <div class="specimen">
    <div class="meta">Display MD<br>48px / 300</div>
    <div class="text" style="font-size:36px;font-weight:300;line-height:1.25;font-style:italic;">disappear inside their<br>own weddings.</div>
  </div>
  <div class="specimen">
    <div class="meta">Display SM<br>30px / 300</div>
    <div class="text" style="font-size:26px;font-weight:300;line-height:1.3;">On the day, you should feel<br>nothing but present.</div>
  </div>
</body>
</html>
