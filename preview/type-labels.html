<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Montserrat', sans-serif; background: #FAF8F4; padding: 24px 32px; }
  .row { display: flex; align-items: center; gap: 24px; margin-bottom: 18px; padding-bottom: 16px; border-bottom: 1px solid rgba(184,146,74,0.1); }
  .row:last-child { border-bottom: none; }
  .meta { font-size: 8px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: #8A8478; min-width: 90px; }
</style>
</head>
<body>
  <div class="row">
    <div class="meta">Section Label</div>
    <div style="font-size:10px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:#B8924A;">What We Do</div>
  </div>
  <div class="row">
    <div class="meta">Nav / CTA</div>
    <div style="font-size:10px;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;color:#8A8478;">Services &nbsp;&nbsp; About &nbsp;&nbsp; Portfolio &nbsp;&nbsp; Contact</div>
  </div>
  <div class="row">
    <div class="meta">Service Num</div>
    <div style="font-size:11px;font-weight:500;letter-spacing:3px;color:#B8924A;">01 — Wedding Management</div>
  </div>
  <div class="row">
    <div class="meta">Tag / Badge</div>
    <div style="font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#D4AA6A;border:1px solid rgba(184,146,74,0.35);padding:7px 16px;display:inline-block;">By Mira · One on One · Dubai</div>
  </div>
  <div class="row">
    <div class="meta">Footer Tag</div>
    <div style="font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#B8924A;">Coordination · Presence · Memory</div>
  </div>
  <div class="row">
    <div class="meta">Copyright</div>
    <div style="font-size:10px;color:rgba(26,24,20,0.28);">© Wedding Essentials · Dubai · All rights reserved.</div>
  </div>
</body>
</html>
