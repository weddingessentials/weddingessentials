<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Montserrat', sans-serif; background: #FAF8F4; padding: 20px 24px; }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; align-items: end; }
  .token { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .block { background: #B8924A; opacity: 0.7; width: 100%; }
  .val { font-size: 8px; font-weight: 500; letter-spacing: 1px; color: #8A8478; text-align: center; }
  .name { font-size: 7.5px; color: #B8924A; text-align: center; letter-spacing: 0.5px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="token"><div class="block" style="height:8px;"></div><div class="val">8px</div><div class="name">space-1</div></div>
    <div class="token"><div class="block" style="height:16px;"></div><div class="val">16px</div><div class="name">space-2</div></div>
    <div class="token"><div class="block" style="height:24px;"></div><div class="val">24px</div><div class="name">space-3</div></div>
    <div class="token"><div class="block" style="height:32px;"></div><div class="val">32px</div><div class="name">space-4</div></div>
    <div class="token"><div class="block" style="height:40px;"></div><div class="val">40px</div><div class="name">space-5</div></div>
    <div class="token"><div class="block" style="height:48px;"></div><div class="val">48px</div><div class="name">space-6</div></div>
    <div class="token"><div class="block" style="height:60px;"></div><div class="val">60px</div><div class="name">space-8</div></div>
    <div class="token"><div class="block" style="height:80px;"></div><div class="val">80px</div><div class="name">space-10</div></div>
  </div>
</body>
</html>
