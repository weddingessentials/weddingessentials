<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Montserrat', sans-serif; background: #FAF8F4; }
  nav { display: flex; align-items: center; justify-content: space-between; padding: 20px 40px; background: rgba(250,248,244,0.94); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(184,146,74,0.15); box-shadow: 0 2px 30px rgba(0,0,0,0.06); }
  .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 400; letter-spacing: 2px; color: #1A1814; }
  .nav-links { display: flex; gap: 32px; list-style: none; }
  .nav-links a { font-size: 10px; font-weight: 500; letter-spacing: 2.5px; text-transform: uppercase; color: #8A8478; text-decoration: none; }
  .nav-links a.active { color: #B8924A; }
  .nav-cta { font-size: 10px; font-weight: 500; letter-spacing: 2.5px; text-transform: uppercase; color: #1A1814; border-bottom: 1px solid #B8924A; padding-bottom: 2px; }
  .note { font-size: 8.5px; letter-spacing: 1px; text-transform: uppercase; color: #B8924A; text-align: center; padding: 10px; }
</style>
</head>
<body>
  <nav>
    <span class="nav-logo">Wedding Essentials</span>
    <ul class="nav-links">
      <li><a href="#">Services</a></li>
      <li><a href="#" class="active">About</a></li>
      <li><a href="#">Portfolio</a></li>
      <li><a href="#">Free Guide</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
    <a class="nav-cta">Enquire</a>
  </nav>
  <div class="note">Frosted glass · backdrop-filter: blur(12px) · border-bottom gold 15% opacity</div>
</body>
</html>
