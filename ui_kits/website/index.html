<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Essentials Dubai — Bridal Assistants, Wedding Management & Catwalk Lessons</title>
<meta name="description" content="We change the energy in the room. Wedding Essentials offers bridal assistants, full wedding management, and catwalk confidence training for the Dubai bride who refuses to leave anything to chance.">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Montserrat', sans-serif; background: #FAF8F4; color: #1A1814; font-weight: 300; overflow-x: hidden; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
  @keyframes scrollPulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
  @keyframes waPulse { 0%,100%{box-shadow:0 0 0 0 rgba(184,146,74,0.4);} 70%{box-shadow:0 0 0 10px rgba(184,146,74,0);} }

  /* WhatsApp float */
  .wa-float {
    position: fixed; bottom: 28px; right: 28px; z-index: 999;
    background: #1A1814; color: #D4AA6A;
    font-family: 'Montserrat', sans-serif; font-size: 9px; font-weight: 500;
    letter-spacing: 2px; text-transform: uppercase; text-decoration: none;
    padding: 13px 22px; border: 1px solid rgba(184,146,74,0.4);
    display: flex; align-items: center; gap: 10px;
    transition: all 0.3s ease;
    animation: waPulse 2.5s ease-in-out infinite;
  }
  .wa-float:hover { background: #B8924A; color: #fff; border-color: #B8924A; }
  .wa-dot { width: 6px; height: 6px; border-radius: 50%; background: #4CAF50; flex-shrink: 0; }
</style>
</head>
<body>
<div id="root"></div>

<!-- WhatsApp float button -->
<a class="wa-float" href="https://wa.me/971506881534" target="_blank" rel="noopener">
  <span class="wa-dot"></span>
  WhatsApp
</a>

<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Services.jsx"></script>
<script type="text/babel" src="About.jsx"></script>
<script type="text/babel" src="Contact.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [screen, setScreen] = useState(() => localStorage.getItem('we-screen') || 'home');
  const [formSent, setFormSent] = useState(false);

  useEffect(() => { localStorage.setItem('we-screen', screen); }, [screen]);

  const nav = (s) => { setScreen(s); window.scrollTo(0,0); };

  return (
    <div>
      <WENav active={screen} onNav={nav} />
      {screen === 'home'     && <WEHero onNav={nav} />}
      {screen === 'services' && <WEServices onNav={nav} />}
      {screen === 'about'    && <WEAbout onNav={nav} />}
      {screen === 'contact'  && <WEContact sent={formSent} onSent={() => setFormSent(true)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
